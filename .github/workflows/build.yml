name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y scons git libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav libgstreamer-plugins-base1.0-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev python3-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev libffi-dev uuid-dev tk-dev openjdk-17-jdk ccache zip unzip
          pip install --upgrade pip setuptools virtualenv
          pip install "cython<3.0.0" buildozer

      - name: Init Buildozer
        run: buildozer init

      - name: Configure buildozer.spec
        run: |
          sed -i 's/requirements = python3,kivy/requirements = python3==3.10.11,kivy/g' buildozer.spec
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec

      - name: Build APK with Buildozer
        run: yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/artifacts@v4
        with:
          name: calculator-apk
          path: bin/*.apk
